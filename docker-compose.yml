services:
  labben:
    image: ghcr.io/einord/labben:latest
    ports:
      - "3005:3005"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${COMPOSE_PATH:?Set COMPOSE_PATH in .env}:/data/compose
      - labben-data:/data/db
      # Uncomment to enable backups:
      # - ${BACKUP_PATH}:/backups
    environment:
      - COMPOSE_HOST_DIR=${COMPOSE_PATH}
      - AUTH_RP_ID=${AUTH_RP_ID:-localhost}
      - AUTH_ORIGIN=${AUTH_ORIGIN:-http://localhost:3005}
      - AUTH_SESSION_SECRET=${AUTH_SESSION_SECRET:-}
      - ENCRYPTION_SECRET=${ENCRYPTION_SECRET:-}
    restart: unless-stopped

volumes:
  labben-data:
